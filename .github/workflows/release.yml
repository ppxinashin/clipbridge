name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ClipBridge v__VERSION__
          releaseBody: |
            ClipBridge __VERSION__ 桌面版本。

            - Material Design 3 界面、暗黑模式与可调主题色
            - Option/Alt + V 呼出剪贴板历史
            - Markdown 便签与图片支持
            - macOS 菜单栏和 Windows 系统托盘

            **macOS 安装提示**

            macOS 版本使用免费的 Ad-hoc 签名，但尚未进行 Apple Developer ID 签名和公证。请确认安装包来自本 Release，将应用拖入“应用程序”；首次打开若提示无法验证开发者，请进入“系统设置 → 隐私与安全性”并点击“仍要打开”。

            如果系统仍提示“ClipBridge 已损坏，无法打开”，执行：

            ```bash
            xattr -dr com.apple.quarantine "/Applications/ClipBridge.app"
            open "/Applications/ClipBridge.app"
            ```

            该命令只解除 ClipBridge 的下载隔离，不会关闭 macOS 的全局安全保护。
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}
